services:
  web:
    build: .
    container_name: bookstore-web
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - ./instance:/app/instance
    environment:
      - FLASK_APP=app.py
      - FLASK_DEBUG=0
      - DATABASE_URI=mysql+pymysql://root:bookstore2025@db:3306/BookStore
    depends_on:
      db:
        condition: service_started
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: bookstore-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_DATABASE=BookStore
      - MYSQL_ROOT_PASSWORD=bookstore2025
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:

